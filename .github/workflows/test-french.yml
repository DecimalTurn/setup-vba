name: Test Setup VBA (French)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - ".gitattributes"
      - ".devcontainer/**"
      - ".github/workflows/post_release.yml"
      - ".github/workflows/prepare_release.yml"

jobs:
  test-setup-vba-fr:
    runs-on: windows-2025
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run setup-vba with French locale
        id: setup_vba
        uses: ./
        with:
          office-apps: Excel,Access
          office-language: fr-fr

      - name: Validate action outputs
        shell: pwsh
        run: |
          $actual = "${{ steps.setup_vba.outputs.office-apps }}"
          $expected = "Excel,Access"

          Write-Host "Expected office-apps output: $expected"
          Write-Host "Actual office-apps output:   $actual"

          if ($actual -ne $expected) {
            throw "Unexpected office-apps output."
          }

      - name: Validate VBA security registry settings
        shell: pwsh
        run: |
          function Get-OfficeVersion([string]$app) {
            $curVerPath = "Registry::HKEY_CLASSES_ROOT\$app.Application\CurVer"
            if (-not (Test-Path $curVerPath)) {
              throw "Missing registry path: $curVerPath"
            }
            $curVer = (Get-ItemProperty -Path $curVerPath).'(default)'
            return $curVer.Replace("$app.Application.", "") + ".0"
          }

          function Assert-RegistryValueAnyPath([string[]]$paths, [string]$name, [int]$expected) {
            $matched = $false
            foreach ($path in $paths) {
              if (-not (Test-Path $path)) {
                continue
              }

              $value = (Get-ItemProperty -Path $path -Name $name -ErrorAction SilentlyContinue).$name
              if ($null -ne $value -and [int]$value -eq $expected) {
                Write-Host "Validated $name=$expected at $path"
                $matched = $true
                break
              }
            }

            if (-not $matched) {
              throw "Could not validate $name=$expected in any expected registry path."
            }
          }

          $apps = @("Excel", "Access")
          foreach ($app in $apps) {
            $version = Get-OfficeVersion -app $app

            $accessVbomPaths = @(
              "HKCU:\Software\Microsoft\Office\$version\$app\Security",
              "HKLM:\Software\Microsoft\Office\$version\$app\Security",
              "HKLM:\Software\WOW6432Node\Microsoft\Office\$version\$app\Security",
              "HKCU:\Software\Microsoft\Office\$version\Common\TrustCenter",
              "HKLM:\Software\Microsoft\Office\$version\Common\TrustCenter"
            )

            $macroPaths = @(
              "HKCU:\Software\Microsoft\Office\$version\$app\Security",
              "HKLM:\Software\Microsoft\Office\$version\$app\Security"
            )

            Assert-RegistryValueAnyPath -paths $accessVbomPaths -name "AccessVBOM" -expected 1
            Assert-RegistryValueAnyPath -paths $macroPaths -name "VBAWarnings" -expected 1
          }

      - name: Validate Office French language installation
        shell: pwsh
        run: |
          function Get-OfficeVersion([string]$app) {
            $curVerPath = "Registry::HKEY_CLASSES_ROOT\$app.Application\CurVer"
            if (-not (Test-Path $curVerPath)) {
              throw "Missing registry path: $curVerPath"
            }
            $curVer = (Get-ItemProperty -Path $curVerPath).'(default)'
            return $curVer.Replace("$app.Application.", "") + ".0"
          }

          $version = Get-OfficeVersion -app "Excel"

          Write-Host "Office version: $version"

          # Check installed language resources in the registry
          $langPaths = @(
            "HKLM:\Software\Microsoft\Office\$version\Common\LanguageResources",
            "HKLM:\Software\WOW6432Node\Microsoft\Office\$version\Common\LanguageResources"
          )

          $foundFrench = $false
          foreach ($path in $langPaths) {
            if (Test-Path $path) {
              Write-Host "Checking: $path"
              $props = Get-ItemProperty -Path $path -ErrorAction SilentlyContinue
              $props.PSObject.Properties | ForEach-Object {
                Write-Host "  $($_.Name) = $($_.Value)"
                if ($_.Value -eq "fr-fr" -or $_.Value -eq "fr-FR" -or $_.Value -eq "1036") {
                  $foundFrench = $true
                }
              }
            }
          }

          # Also check the installed SKU language
          $skuPath = "HKLM:\Software\Microsoft\Office\ClickToRun\Configuration"
          if (Test-Path $skuPath) {
            Write-Host "Checking ClickToRun configuration:"
            $config = Get-ItemProperty -Path $skuPath -ErrorAction SilentlyContinue
            $config.PSObject.Properties | Where-Object { $_.Name -like "*Language*" -or $_.Name -like "*Culture*" -or $_.Name -like "*Locale*" } | ForEach-Object {
              Write-Host "  $($_.Name) = $($_.Value)"
              if ($_.Value -eq "fr-fr" -or $_.Value -eq "fr-FR") {
                $foundFrench = $true
              }
            }
          }

          if (-not $foundFrench) {
            Write-Host "WARNING: Could not confirm French language in registry. This may be expected depending on where the language info is stored."
            Write-Host "The install should still have succeeded - check Chocolatey logs for confirmation."
          } else {
            Write-Host "SUCCESS: French (fr-fr) language confirmed in Office installation."
          }
