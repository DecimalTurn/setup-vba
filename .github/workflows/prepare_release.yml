name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Which part of the version to bump (major, minor, patch)"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
      remove_suffix:
        description: "Remove pre-release suffix (e.g. -alpha)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest tag
        id: get_tag
        shell: bash
        run: |
          latest_tag=$(git tag --sort=-v:refname | sed -nE '/^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$/p' | head -n1)
          echo "Latest tag: $latest_tag"

          if [[ -z "$latest_tag" ]]; then
            current="0.0.0"
          else
            current="${latest_tag#v}"
          fi

          base="${current%%-*}"
          suffix="${current#"$base"}"; suffix="${suffix#-}"
          echo "tag=$base" >> "$GITHUB_OUTPUT"
          echo "suffix=$suffix" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: bump_version
        shell: bash
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.get_tag.outputs.tag }}"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              ((major+=1)); minor=0; patch=0 ;;
            minor)
              ((minor+=1)); patch=0 ;;
            patch)
              ((patch+=1)) ;;
          esac

          new_tag="v${major}.${minor}.${patch}"

          suffix="${{ steps.get_tag.outputs.suffix }}"
          if [[ -n "$suffix" && "${{ github.event.inputs.remove_suffix }}" != "true" ]]; then
            new_tag="${new_tag}-${suffix}"
          fi

          echo "New tag: $new_tag"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_tag }}"
          NEW_VERSION="${NEW_VERSION#v}"
          TODAY="$(date +%Y-%m-%d)"

          if ! grep -q "^## \[$NEW_VERSION\]" CHANGELOG.md; then
            awk -v ver="$NEW_VERSION" -v dt="$TODAY" '
              {
                print
                if (!inserted && $0 == "## [Unreleased]") {
                  print ""
                  print "## [" ver "] - " dt
                  inserted=1
                }
              }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

          release_url="https://github.com/${{ github.repository }}/releases/tag/${{ steps.bump_version.outputs.new_tag }}"
          if ! grep -q "^\[$NEW_VERSION\]:" CHANGELOG.md; then
            echo "[$NEW_VERSION]: $release_url" >> CHANGELOG.md
          fi

      - name: Commit changes
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_tag }}"
          git push origin ${{ github.ref_name }}
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump_version.outputs.new_tag }}
          target_commitish: ${{ steps.commit.outputs.sha }}
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release link to summary
        run: |
          release_url="https://github.com/${{ github.repository }}/releases/tag/${{ steps.bump_version.outputs.new_tag }}"
          {
            echo "## Release prepared"
            echo ""
            echo "- Tag: \`${{ steps.bump_version.outputs.new_tag }}\`"
            echo "- Draft release: [$release_url]($release_url)"
          } >> "$GITHUB_STEP_SUMMARY"