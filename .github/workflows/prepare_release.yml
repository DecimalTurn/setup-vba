name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Which part of the version to bump"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
          - no-bump
      remove_suffix:
        description: "Remove pre-release suffix (e.g. -alpha)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next_version.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
      release_url: ${{ steps.create_draft_release.outputs.url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Get current version from git tags
        id: current_version
        run: |
          latest_tag=$(git tag --sort=-v:refname | sed -nE '/^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$/p' | head -n1)
          echo "Latest tag: $latest_tag"

          if [[ -z "$latest_tag" ]]; then
            current="0.0.0"
          else
            current="${latest_tag#v}"
          fi

          base="${current%%-*}"
          if [[ "$current" == *-* ]]; then
            suffix="${current#*-}"
          else
            suffix=""
          fi
          echo "Current version: $current (base=$base, suffix=$suffix)"
          echo "base=$base" >> $GITHUB_OUTPUT
          echo "suffix=$suffix" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next_version
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current_version.outputs.base }}"

          if [[ "${{ github.event.inputs.version_bump }}" == "no-bump" ]]; then
            new_version="${{ steps.current_version.outputs.base }}"
            suffix="${{ steps.current_version.outputs.suffix }}"
            if [[ -n "$suffix" && "${{ github.event.inputs.remove_suffix }}" != "true" ]]; then
              new_version="$new_version-$suffix"
            fi
            echo "No version bump selected."
          else
            case "${{ github.event.inputs.version_bump }}" in
              major) ((major+=1)); minor=0; patch=0 ;;
              minor) ((minor+=1)); patch=0 ;;
              patch) ((patch+=1)) ;;
            esac
            new_version="$major.$minor.$patch"
            suffix="${{ steps.current_version.outputs.suffix }}"
            if [[ -n "$suffix" && "${{ github.event.inputs.remove_suffix }}" != "true" ]]; then
              new_version="$new_version-$suffix"
            fi
            echo "Next version: $new_version"
          fi
          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "tag=v$new_version" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        if: github.event.inputs.version_bump != 'no-bump'
        run: |
          today=$(date +%Y-%m-%d)
          version="${{ steps.next_version.outputs.version }}"

          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "CHANGELOG.md is missing the '## [Unreleased]' header."
            exit 1
          fi

          # Insert the new release header right after [Unreleased]
          sed -i "0,/^## \[Unreleased\]$/s//## [Unreleased]\\n\\n## [$version] - $today/" CHANGELOG.md

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          version="${{ steps.next_version.outputs.version }}"
          tag="v$version"
          # Extract lines between the version header and the next ## header.
          # Trim surrounding blank lines.
          awk "/^## \\[$version\\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | sed '/./,$!d' | sed -e :a -e '/^\s*$/{$d;N;ba}' > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "(No changelog entries found for $version)" > release-notes.md
          fi
          prev_tag=$(git tag --sort=-version:refname | head -1)
          if [[ -n "$prev_tag" ]]; then
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${tag}" >> release-notes.md
          fi

      - name: Commit changes
        id: commit
        run: |
          if [[ "${{ github.event.inputs.version_bump }}" != "no-bump" ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add CHANGELOG.md
            git commit -m "chore: bump version to ${{ steps.next_version.outputs.version }}"
            git push origin ${{ github.ref_name }}
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "Skipping commit (no-bump selected)"
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Create Draft Release
        id: create_draft_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          target_commitish: ${{ steps.commit.outputs.sha }}
          body_path: release-notes.md
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release link to summary
        run: |
          {
            echo "## Release prepared"
            echo ""
            echo "- Tag: \`${{ steps.next_version.outputs.tag }}\`"
            echo "- Draft release: [${{ steps.create_draft_release.outputs.url }}](${{ steps.create_draft_release.outputs.url }})"
          } >> "$GITHUB_STEP_SUMMARY"