name: "Setup VBA"
description: "Set up your GitHub Actions workflow to run VBA automations on a Windows runner."

branding:
  icon: "settings"
  color: "blue"

inputs:
  office-apps:
    description: "Comma-separated Office apps to install and prepare. Only listed apps are installed; all others are excluded via ODT ExcludeApp to reduce installation time. Supported: Access, Excel, Outlook, PowerPoint, Publisher, Word."
    required: false
    default: "Excel,Word,PowerPoint,Access"
  install-office:
    description: "Whether to install Microsoft Office via Chocolatey."
    required: false
    default: "true"
  office-package:
    description: "Chocolatey package used to install Office when install-office=true."
    required: false
    default: "office365proplus"
  office-language:
    description: "Language/locale code for Office installation (e.g. fr-fr, de-de, es-es). Only used when install-office=true."
    required: false
    default: ""

outputs:
  office-apps:
    description: "Normalized, comma-separated Office apps that were prepared."
    value: ${{ steps.setup_vba.outputs.office-apps }}

runs:
  using: "composite"
  steps:
    - name: "Install Office"
      if: inputs.install-office == 'true'
      id: install_office
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        # Build the list of ODT ExcludeApp IDs to exclude (all apps NOT in office-apps).
        # All known Click-to-Run app IDs that ship with O365ProPlusRetail:
        $allOdtAppIds = @(
          "Access", "Excel", "Groove", "Lync", "OneDrive", "OneNote",
          "Outlook", "OutlookForWindows", "PowerPoint", "Publisher", "Teams", "Word"
        )

        # Map user-facing names to ODT IDs (they are the same, but case-insensitive matching).
        $wantedRaw = "${{ inputs.office-apps }}" -split "," | ForEach-Object { $_.Trim() }
        $wanted = @()
        foreach ($raw in $wantedRaw) {
          if (-not $raw) { continue }
          $match = $allOdtAppIds | Where-Object { $_ -ieq $raw } | Select-Object -First 1
          if ($match) { $wanted += $match }
        }
        if ($wanted.Count -eq 0) {
          throw "No valid Office apps found in office-apps input. Valid IDs: $($allOdtAppIds -join ', ')"
        }

        $excludeIds = $allOdtAppIds | Where-Object { $_ -notin $wanted }
        Write-Host "Installing Office apps:   $($wanted -join ', ')"
        Write-Host "Excluding Office apps:    $($excludeIds -join ', ')"

        # Generate ODT configuration XML with ExcludeApp elements.
        $excludeXml = ($excludeIds | ForEach-Object { "      <ExcludeApp ID=`"$_`" />" }) -join "`n"
        $languageId = "${{ inputs.office-language }}"
        if (-not $languageId) { $languageId = "MatchOS" }

        $configXml = @"
        <Configuration>
          <Add OfficeClientEdition="64" Channel="MonthlyEnterprise">
            <Product ID="O365ProPlusRetail">
              <Language ID="$languageId" />
        $excludeXml
            </Product>
          </Add>
          <Display Level="None" AcceptEULA="TRUE" />
        </Configuration>
        "@

        $configPath = Join-Path $env:RUNNER_TEMP "odt-config.xml"
        $configXml | Out-File -FilePath $configPath -Encoding utf8
        Write-Host "ODT config written to: $configPath"
        Write-Host "---- config.xml ----"
        Write-Host $configXml
        Write-Host "---------------------"

        # Build choco params: ConfigPath is always set; Language is set separately
        # only when the user explicitly provides it (ConfigPath handles MatchOS).
        $chocoParams = "/ConfigPath:`"$configPath`""
        $userLanguage = "${{ inputs.office-language }}"
        if ($userLanguage) {
          $chocoParams += " /Language:$userLanguage"
        }

        Write-Host "Running: choco install ${{ inputs.office-package }} -y --params `"$chocoParams`""
        choco install "${{ inputs.office-package }}" -y --params "$chocoParams"

    - name: "Display Chocolatey logs if install fails"
      if: failure() && steps.install_office.outcome == 'failure'
      shell: pwsh
      run: |
        if (Test-Path -Path "C:\ProgramData\chocolatey\logs\chocolatey.log") {
          Write-Host "============ Chocolatey Log Contents ============"
          Write-Host "Last 1000 lines of Chocolatey log:"
          Get-Content -Path "C:\ProgramData\chocolatey\logs\chocolatey.log" -Tail 1000
          Write-Host "============ End of Chocolatey Logs ============="
        }

    - name: "Setup VBA environment"
      id: setup_vba
      shell: pwsh
      run: |
        ${{ github.action_path }}\scripts\Setup-VBA.ps1 -OfficeApps "${{ inputs.office-apps }}"
